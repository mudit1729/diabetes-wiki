<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in &middot; {{ repo_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,500;6..72,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
      body.lock-body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(ellipse at top left, rgba(239, 68, 68, 0.06), transparent 50%),
          radial-gradient(ellipse at bottom right, rgba(220, 38, 38, 0.05), transparent 50%),
          var(--bg);
      }
      [data-theme="dark"] body.lock-body {
        background:
          radial-gradient(ellipse at top left, rgba(239, 68, 68, 0.08), transparent 50%),
          radial-gradient(ellipse at bottom right, rgba(220, 38, 38, 0.07), transparent 50%),
          var(--bg);
      }
      .lock-card {
        width: min(420px, calc(100vw - 32px));
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        padding: 40px 36px 32px;
        box-shadow: var(--shadow-lg);
      }
      .lock-mark {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: var(--accent-soft);
        color: var(--accent);
        margin-bottom: 24px;
      }
      .lock-title {
        font-family: "Newsreader", "Inter", serif;
        font-weight: 700;
        font-size: 28px;
        line-height: 1.15;
        letter-spacing: -0.01em;
        margin: 0 0 8px;
        color: var(--text);
      }
      .lock-subtitle {
        margin: 0 0 28px;
        color: var(--text-secondary);
        font-size: 14.5px;
        line-height: 1.5;
      }
      .lock-form { display: flex; flex-direction: column; gap: 14px; }
      .lock-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-tertiary);
        margin-bottom: 6px;
      }
      .lock-input {
        width: 100%;
        font: inherit;
        font-size: 15px;
        padding: 12px 14px;
        background: var(--bg-subtle);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        color: var(--text);
        transition: border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
      }
      .lock-input:focus {
        outline: none;
        border-color: var(--accent);
        background: var(--bg-elevated);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .lock-error {
        font-size: 13px;
        color: var(--red);
        background: var(--red-soft);
        border: 1px solid var(--red-soft);
        padding: 10px 12px;
        border-radius: var(--radius-md);
        margin-top: -4px;
      }
      .lock-submit {
        margin-top: 6px;
        width: 100%;
        padding: 12px 16px;
        font: inherit;
        font-weight: 600;
        font-size: 14.5px;
        color: white;
        background: var(--accent);
        border: 0;
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: background 120ms ease, transform 60ms ease;
      }
      .lock-submit:hover { background: var(--accent-hover); }
      .lock-submit:active { transform: translateY(1px); }
      .lock-foot {
        margin-top: 22px;
        font-size: 12.5px;
        color: var(--text-tertiary);
        text-align: center;
      }
      .lock-foot strong { color: var(--text-secondary); font-weight: 600; }
    </style>
  </head>
  <body class="lock-body">
    <main class="lock-card" role="main">
      <div class="lock-mark" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1 class="lock-title">{{ repo_title }}</h1>
      <p class="lock-subtitle">This wiki is private. Enter the password to continue.</p>

      <form class="lock-form" method="post" action="{{ url_for('login') }}" autocomplete="off">
        <input type="hidden" name="next" value="{{ next_url }}">
        <div>
          <label class="lock-label" for="password">Password</label>
          <input
            class="lock-input"
            id="password"
            name="password"
            type="password"
            autofocus
            required
            autocomplete="current-password"
            spellcheck="false"
          >
        </div>
        {% if error %}
          <div class="lock-error" role="alert">{{ error }}</div>
        {% endif %}
        <button class="lock-submit" type="submit">Unlock</button>
      </form>

      <p class="lock-foot"><strong>{{ repo_title }}</strong> &middot; {{ repo_title_long }}</p>
    </main>

    <script>
      (function() {
        const saved = localStorage.getItem('theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
        else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.setAttribute('data-theme', 'dark');
      })();
    </script>
  </body>
</html>
